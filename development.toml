# ─── FIRESTORE SCHEMA ───────────────────────────────────────────────────────

[schema.users]
uid              = "string — matches Auth UID"
displayName      = "string"
email            = "string"
photoURL         = "string"
joinedAt         = "Timestamp"
"stats.totalMalas"    = "number"
"stats.totalMantras"  = "number — totalMalas x 108"
"stats.streakDays"    = "number"
"stats.lastChantDate" = "string — YYYY-MM-DD"

[schema.users]
role           = "string — 'user' | 'community_admin' | 'superadmin'"
status         = "string — 'active' | 'banned' | 'suspended'"
plan           = "string — 'free' | 'pro' | 'community'"
planExpiresAt  = "Timestamp | null"

[schema.pledges]
id           = "string"
title        = "string"
description  = "string"
targetMalas  = "number"
currentMalas = "number — BATCH WRITE ONLY via FieldValue.increment"
participants = "number"
creatorId    = "string"
mantra       = "string — optional"

[schema.pledge_participants]
id                = "string — composite: pledgeId_userId"
pledgeId          = "string"
userId            = "string"
contributedMalas  = "number"
joinedAt          = "Timestamp"
userDisplayName   = "string — cached"
pledgeTitle       = "string — cached"

[schema.reports]
id          = "string"
communityId = "string"
authorId    = "string"
content     = "string"
createdAt   = "Timestamp"
likes       = "number — future"

[schema.chats]
id          = "string"
communityId = "string"
authorId    = "string"
message     = "string"
createdAt   = "Timestamp"

[schema.admin_logs]
logId     = "string"
action    = "string — AdminAction enum"
targetId  = "string — uid or communityId"
adminId   = "string — superadmin uid"
reason    = "string"
createdAt = "Timestamp"

[schema.donations]
donationId     = "string"
userId         = "string"
amount         = "number"
currency       = "string — INR | USD"
gateway        = "string — razorpay | stripe"
gatewayOrderId = "string"
status         = "string — pending | completed | failed"
createdAt      = "Timestamp"



# ─── ALGORITHMS (NEVER CHANGE WITHOUT ADR) ──────────────────────────────────

[algo.streak]
file  = "services/userService.ts → extract to services/streakUtils.ts"
rule  = "ONE place only — never duplicate"
logic = [
  "same day      → no change",
  "yesterday     → streakDays + 1",
  "older / null  → reset to 1",
  "write back    → setDoc merge:true via resilience.ts"
]

[algo.resilience]
file      = "services/resilience.ts"
timeout   = "5000ms"
primary   = "Firestore call"
fallback  = "localStore.ts (LocalStorage mock)"
sync_key  = "japa_sync_queue"
ls_schema = "japa_<collection>_<docId>"
max_retry = 3
rule      = "EVERY Firestore call goes through resilience.ts — NO direct Firestore calls"

[algo.pledge_batch]
file  = "CommunityCounterTab.tsx → extract to services/pledgeService.ts"
rule  = "writeBatch() — both pledges.currentMalas AND pledge_participants.contributedMalas in ONE batch"
write = "FieldValue.increment only — never read-then-write"

[algo.guest_mode]
can    = ["view public communities", "read feed", "see pledge progress", "use counter (localStore only)"]
cannot = ["join community", "post/chat", "contribute to pledge", "view private communities"]
guard  = "if (!currentUser) { show auth prompt; return } — consistent across ALL tabs"

