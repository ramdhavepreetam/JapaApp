# development.toml — JapaApp Single Source of Truth
# AI: read this file FIRST before writing any code.
# Last updated: 2026-03-14

[project]
name = "JapaApp"
type = "PWA"
completion = "85%"
stack = ["React18", "TypeScript", "Vite", "TailwindCSS", "MUI", "FramerMotion", "Firebase"]
routing = "state-based via App.tsx — NO react-router"
backend = "Firebase: Firestore + Auth + Hosting (serverless only)"
offline = "resilience.ts + localStore.ts + syncService.ts"
testing = "Vitest + React Testing Library"

[project.design]
primary    = "#F59E0B"
secondary  = "#4338CA"
background = "#FFFBF0"
min_tap    = "48x48px"
font       = "premium spiritual — no generic system fonts"

[project.env]
VITE_FIREBASE_API_KEY            = ""
VITE_FIREBASE_AUTH_DOMAIN        = ""
VITE_FIREBASE_PROJECT_ID         = ""
VITE_FIREBASE_STORAGE_BUCKET     = ""
VITE_FIREBASE_MESSAGING_SENDER_ID = ""
VITE_FIREBASE_APP_ID             = ""

