# ─── HARD RULES (AI must follow) ────────────────────────────────────────────

[rules]
must = [
  "Read this file before writing any code",
  "Every Firestore call goes through resilience.ts",
  "Streak logic lives ONLY in streakUtils.ts",
  "Pledge writes use writeBatch + FieldValue.increment",
  "No module reads another module's Firestore path directly",
  "No `any` types",
  "No secrets — use env var placeholders only",
  "Never rewrite working modules unless slice requires it",
  "Never change module boundaries without an ADR"
]
stop_and_ask = [
  "Firestore schema change with no ADR",
  "Auth/guest boundary unclear",
  "Batch write scope ambiguous",
  "Diff exceeds 20 files or 800 LOC"
]

